{{if .}}
  {{range .}}
  <div class="result-row"
       hx-get="/api/contestants/{{.ContestantID}}"
       hx-target="#contestant-detail"
       hx-swap="innerHTML">
    <span class="result-name">{{.FirstName}} {{.LastName}}</span>
    <span class="result-meta">{{if .Hometown}}{{.Hometown}} &nbsp;&middot;&nbsp; {{end}}{{.EventTypes}}</span>
  </div>
  {{end}}
{{else}}
  <p class="hint">No contestants found.</p>
{{end}}
