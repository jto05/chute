<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chute — Sheet Builder</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f4f0;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #1e1e1e;
      color: #fff;
      padding: 14px 24px;
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: .05em;
    }

    /* ── Three-column layout ── */
    .layout {
      display: grid;
      grid-template-columns: 280px 1fr 300px;
      gap: 16px;
      max-width: 1300px;
      margin: 20px auto;
      padding: 0 16px;
      align-items: start;
    }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr 1fr; }
      .col-detail { grid-column: span 2; order: -1; }
    }
    @media (max-width: 560px) {
      .layout { grid-template-columns: 1fr; }
      .col-detail { grid-column: span 1; }
    }

    .panel {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 16px;
    }

    h2 {
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: #888;
      margin-bottom: 10px;
    }

    /* ── Search column ── */
    input[type=text] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: .9rem;
    }
    input[type=text]:focus { outline: 2px solid #5a8a5a; border-color: #5a8a5a; }

    #search-results { margin-top: 10px; }

    .result-row {
      padding: 8px 6px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }
    .result-row:hover { background: #f0f0e8; }

    .result-name { display: block; font-weight: 600; font-size: .88rem; }
    .result-meta { display: block; color: #888; font-size: .78rem; margin-top: 1px; }

    .hint { color: #aaa; font-size: .82rem; padding: 6px 0; }

    /* ── Detail column ── */
    .detail-empty {
      color: #bbb;
      font-size: .88rem;
      padding: 20px 0;
      text-align: center;
    }

    .contestant-photo {
      width: 100%;
      max-height: 200px;
      object-fit: cover;
      border-radius: 4px;
      margin-bottom: 12px;
    }

    .detail-header { margin-bottom: 10px; }
    .detail-name { font-size: 1.4rem; font-weight: 700; line-height: 1.2; }
    .detail-nick { color: #888; font-style: italic; font-size: .9rem; margin-top: 2px; }
    .detail-hometown { color: #555; font-size: .88rem; margin-top: 4px; }

    .event-tags { display: flex; flex-wrap: wrap; gap: 5px; margin: 10px 0; }
    .event-tag {
      background: #e8f0e8;
      color: #3d6b3d;
      border-radius: 3px;
      padding: 2px 8px;
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .03em;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 12px 0;
    }

    .stat {
      background: #f8f8f5;
      border: 1px solid #e8e8e0;
      border-radius: 4px;
      padding: 8px 10px;
    }
    .stat-label { display: block; font-size: .7rem; color: #999; text-transform: uppercase; letter-spacing: .05em; }
    .stat-value { display: block; font-size: 1.05rem; font-weight: 700; margin-top: 2px; }

    .bio-section { margin-top: 14px; }
    .bio-heading {
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #aaa;
      margin-bottom: 8px;
    }

    /* Biography HTML content */
    .bio-text { font-size: .86rem; line-height: 1.65; color: #333; }
    .bio-text p { margin-bottom: .85em; }
    .bio-text p:last-child { margin-bottom: 0; }
    .bio-text strong { font-weight: 700; color: #1a1a1a; }
    .bio-text i, .bio-text em { font-style: italic; color: #555; }

    .bio-year { font-weight: 700; color: #3d6b3d; }
    .bio-money {
      font-weight: 600;
      color: #7a4e00;
      background: #fff8ee;
      border-radius: 2px;
      padding: 0 2px;
    }

    /* ── Notes section inside detail panel ── */
    .notes-section {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 2px solid #e8e8e0;
    }

    .notes-section-label {
      display: block;
      font-size: .95rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 4px;
    }

    .notes-hint {
      font-size: .78rem;
      color: #aaa;
      margin-bottom: 10px;
    }

    .detail-notes-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #c8c8be;
      border-radius: 4px;
      font-size: .95rem;
      font-family: inherit;
      line-height: 1.55;
      resize: vertical;
      background: #fafaf5;
      color: #1a1a1a;
    }
    .detail-notes-input:focus {
      outline: 2px solid #8a7a3d;
      border-color: #8a7a3d;
      background: #fffef7;
    }
    .detail-notes-input::placeholder { color: #bbb; }

    .btn-add-roster {
      margin-top: 12px;
      width: 100%;
      padding: 11px;
      background: #3d7a3d;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-add-roster:hover { background: #2e5e2e; }
    .btn-add-roster.added { background: #5a8a5a; cursor: default; }

    /* ── Roster column ── */
    .rodeo-fields { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }

    #roster-list { list-style: none; margin-bottom: 14px; min-height: 30px; }

    .roster-item {
      padding: 9px 8px;
      border-bottom: 1px solid #eee;
    }

    .roster-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .roster-name { font-weight: 600; font-size: .88rem; }
    .roster-events { color: #aaa; font-size: .75rem; margin-left: 6px; }

    .roster-notes-preview {
      font-size: .78rem;
      color: #888;
      font-style: italic;
      margin-top: 3px;
      line-height: 1.4;
      /* clamp to 2 lines */
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .btn-remove {
      background: none;
      border: none;
      color: #c0392b;
      cursor: pointer;
      font-size: .9rem;
      line-height: 1;
      padding: 0 2px;
      flex-shrink: 0;
    }
    .btn-remove:hover { color: #922b21; }

    .btn-pdf {
      width: 100%;
      padding: 10px;
      background: #1e1e1e;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-pdf:hover { background: #3a3a3a; }
    .btn-pdf:disabled { background: #bbb; cursor: default; }

    .empty-state { color: #ccc; font-size: .82rem; padding: 8px 0; }
  </style>
</head>
<body>
  <header>CHUTE &mdash; Sheet Builder</header>

  <div class="layout">

    <!-- Col 1: Search -->
    <div class="panel col-search">
      <h2>Search</h2>
      <input
        type="text"
        id="search-input"
        placeholder="Contestant name&hellip;"
        hx-get="/api/contestants/search"
        hx-trigger="keyup changed delay:300ms"
        hx-target="#search-results"
        name="q"
        autocomplete="off"
      >
      <div id="search-results">
        <p class="hint">Type to search.</p>
      </div>
    </div>

    <!-- Col 2: Contestant detail + notes input -->
    <div class="panel col-detail" id="contestant-detail">
      <div class="detail-empty"><p>Select a contestant from the search results.</p></div>
    </div>

    <!-- Col 3: Roster -->
    <div class="panel col-roster">
      <h2>Roster</h2>

      <div class="rodeo-fields">
        <input type="text" id="rodeo-name" placeholder="Rodeo name">
        <input type="text" id="rodeo-date" placeholder="Date (e.g. April 12, 2026)">
      </div>

      <ul id="roster-list">
        <li class="empty-state">No contestants added yet.</li>
      </ul>

      <button class="btn-pdf" id="generate-btn" onclick="generatePDF()">Generate PDF</button>
    </div>

  </div>

  <script>
    // roster: [{id, name, events, notes}]
    const roster = [];

    // Called by the "Add to Roster" button inside the detail partial.
    // Reads notes from the textarea that lives alongside it.
    function addFromDetail(btn) {
      const id     = parseInt(btn.dataset.id, 10);
      const name   = btn.dataset.name;
      const events = btn.dataset.events;
      const notes  = (document.getElementById('detail-notes') || {}).value || '';

      const existing = roster.find(r => r.id === id);
      if (existing) {
        // Already in roster — update notes and reflect on button.
        existing.notes = notes;
        renderRoster();
        btn.textContent = '✓ Notes Updated';
        setTimeout(() => { btn.textContent = '✓ Added'; }, 1500);
        return;
      }

      roster.push({ id, name, events, notes });
      renderRoster();
      btn.textContent = '✓ Added';
      btn.classList.add('added');
    }

    // When a detail panel loads, sync the add button and pre-fill notes
    // if this contestant is already in the roster.
    document.body.addEventListener('htmx:afterSwap', function(e) {
      if (e.detail.target.id !== 'contestant-detail') return;
      const btn = e.detail.target.querySelector('.btn-add-roster');
      if (!btn) return;
      const id = parseInt(btn.dataset.id, 10);
      const entry = roster.find(r => r.id === id);
      if (entry) {
        btn.textContent = '✓ Added';
        btn.classList.add('added');
        const ta = document.getElementById('detail-notes');
        if (ta) ta.value = entry.notes;
      }
    });

    function removeFromRoster(id) {
      const idx = roster.findIndex(r => r.id === id);
      if (idx !== -1) roster.splice(idx, 1);
      renderRoster();
      // Re-enable add button if the detail panel is showing this person.
      const btn = document.querySelector('.btn-add-roster');
      if (btn && parseInt(btn.dataset.id, 10) === id) {
        btn.textContent = '+ Add to Roster';
        btn.classList.remove('added');
      }
    }

    function renderRoster() {
      const list = document.getElementById('roster-list');
      list.innerHTML = '';

      if (roster.length === 0) {
        const li = document.createElement('li');
        li.className = 'empty-state';
        li.textContent = 'No contestants added yet.';
        list.appendChild(li);
        return;
      }

      roster.forEach(r => {
        const li = document.createElement('li');
        li.className = 'roster-item';
        const notesHtml = r.notes
          ? `<p class="roster-notes-preview">${esc(r.notes)}</p>`
          : '';
        li.innerHTML = `
          <div class="roster-header">
            <div>
              <span class="roster-name">${esc(r.name)}</span>
              <span class="roster-events">${esc(r.events)}</span>
            </div>
            <button class="btn-remove" onclick="removeFromRoster(${r.id})">&#x2715;</button>
          </div>
          ${notesHtml}`;
        list.appendChild(li);
      });
    }

    async function generatePDF() {
      if (roster.length === 0) { alert('Add at least one contestant.'); return; }

      const btn = document.getElementById('generate-btn');
      btn.disabled = true;
      btn.textContent = 'Generating…';

      try {
        const body = {
          rodeoName:   document.getElementById('rodeo-name').value.trim(),
          rodeoDate:   document.getElementById('rodeo-date').value.trim(),
          contestants: roster.map(r => ({ id: String(r.id), notes: r.notes })),
        };

        const res = await fetch('/api/sheet/pdf', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        if (!res.ok) {
          const err = await res.json();
          alert('Error: ' + (err.error || res.statusText));
          return;
        }

        const blob = await res.blob();
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url;
        a.download = (body.rodeoName || 'chute-roster') + '.pdf';
        a.click();
        URL.revokeObjectURL(url);
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Generate PDF';
      }
    }

    function esc(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
