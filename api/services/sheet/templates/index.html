<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chute — Announcer Sheet</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f4f0;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #1e1e1e;
      color: #fff;
      padding: 14px 24px;
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: .05em;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 1100px;
      margin: 24px auto;
      padding: 0 16px;
    }

    @media (max-width: 700px) {
      .layout { grid-template-columns: 1fr; }
    }

    .panel {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 18px;
    }

    h2 {
      font-size: .85rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #666;
      margin-bottom: 12px;
    }

    input[type=text] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: .95rem;
    }
    input[type=text]:focus { outline: 2px solid #5a8a5a; border-color: #5a8a5a; }

    #search-results { margin-top: 12px; min-height: 40px; }

    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      border-bottom: 1px solid #eee;
      font-size: .9rem;
    }
    .result-row:hover { background: #f9f9f9; }

    .result-name { font-weight: 600; }
    .result-meta { color: #666; font-size: .8rem; }

    .btn-add {
      background: #3d7a3d;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 4px 12px;
      cursor: pointer;
      font-size: .82rem;
      white-space: nowrap;
    }
    .btn-add:hover { background: #2e5e2e; }
    .btn-add:disabled { background: #aaa; cursor: default; }

    .hint { color: #888; font-size: .85rem; padding: 8px 0; }

    /* Roster */
    #roster-list { list-style: none; margin-bottom: 16px; min-height: 40px; }

    .roster-item {
      padding: 10px;
      border-bottom: 1px solid #eee;
      font-size: .9rem;
    }

    .roster-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 6px;
    }

    .roster-name { font-weight: 600; }
    .roster-events { color: #888; font-size: .8rem; margin-left: 8px; }

    .notes-input {
      width: 100%;
      padding: 5px 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: .82rem;
      font-family: inherit;
      resize: vertical;
      min-height: 40px;
      color: #333;
      background: #fafaf5;
    }
    .notes-input:focus { outline: 2px solid #8a7a3d; border-color: #8a7a3d; }
    .notes-label { font-size: .75rem; color: #aaa; margin-bottom: 3px; display: block; }

    .btn-remove {
      background: none;
      border: none;
      color: #c0392b;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      flex-shrink: 0;
    }
    .btn-remove:hover { color: #922b21; }

    .rodeo-fields { margin-bottom: 16px; display: flex; gap: 10px; }
    .rodeo-fields input { flex: 1; }

    .btn-pdf {
      width: 100%;
      padding: 10px;
      background: #1e1e1e;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-pdf:hover { background: #3a3a3a; }
    .btn-pdf:disabled { background: #aaa; cursor: default; }

    .empty-state { color: #aaa; font-size: .85rem; padding: 8px 0; }
  </style>
</head>
<body>
  <header>CHUTE &mdash; Announcer Sheet Builder</header>

  <div class="layout">
    <!-- Left: search -->
    <div class="panel">
      <h2>Search Contestants</h2>
      <input
        type="text"
        id="search-input"
        placeholder="Search by name&hellip;"
        hx-get="/api/contestants/search"
        hx-trigger="keyup changed delay:300ms"
        hx-target="#search-results"
        name="q"
        autocomplete="off"
      >
      <div id="search-results">
        <p class="hint">Type at least 2 characters to search.</p>
      </div>
    </div>

    <!-- Right: roster + generate -->
    <div class="panel">
      <h2>Roster</h2>

      <div class="rodeo-fields">
        <input type="text" id="rodeo-name" placeholder="Rodeo name">
        <input type="text" id="rodeo-date" placeholder="Date (e.g. April 12, 2026)">
      </div>

      <ul id="roster-list">
        <li class="empty-state">No contestants added yet.</li>
      </ul>

      <button class="btn-pdf" id="generate-btn" onclick="generatePDF()">
        Generate PDF
      </button>
    </div>
  </div>

  <script>
    // roster: [{id, name, events, notes}]
    const roster = [];

    function addToRoster(id, name, events) {
      if (roster.find(r => r.id === id)) return;
      roster.push({ id, name, events, notes: '' });
      renderRoster();
    }

    function removeFromRoster(id) {
      const idx = roster.findIndex(r => r.id === id);
      if (idx !== -1) roster.splice(idx, 1);
      renderRoster();
    }

    function updateNotes(id, value) {
      const entry = roster.find(r => r.id === id);
      if (entry) entry.notes = value;
    }

    function renderRoster() {
      const list = document.getElementById('roster-list');
      list.innerHTML = '';

      if (roster.length === 0) {
        const li = document.createElement('li');
        li.className = 'empty-state';
        li.textContent = 'No contestants added yet.';
        list.appendChild(li);
        return;
      }

      roster.forEach(r => {
        const li = document.createElement('li');
        li.className = 'roster-item';
        li.dataset.id = r.id;

        const notesId = `notes-${r.id}`;
        li.innerHTML = `
          <div class="roster-header">
            <div>
              <span class="roster-name">${escHtml(r.name)}</span>
              <span class="roster-events">${escHtml(r.events)}</span>
            </div>
            <button class="btn-remove" title="Remove" onclick="removeFromRoster(${r.id})">&#x2715;</button>
          </div>
          <label class="notes-label" for="${notesId}">Notes for PDF</label>
          <textarea
            id="${notesId}"
            class="notes-input"
            placeholder="e.g. 3x NFR qualifier, won here in 2023…"
            oninput="updateNotes(${r.id}, this.value)"
          >${escHtml(r.notes)}</textarea>
        `;
        list.appendChild(li);
      });
    }

    async function generatePDF() {
      if (roster.length === 0) { alert('Add at least one contestant.'); return; }

      const btn = document.getElementById('generate-btn');
      btn.disabled = true;
      btn.textContent = 'Generating…';

      try {
        // Sync notes from live textareas before sending (oninput covers typing,
        // but this catches any edge cases like autofill).
        roster.forEach(r => {
          const el = document.getElementById(`notes-${r.id}`);
          if (el) r.notes = el.value;
        });

        const body = {
          rodeoName: document.getElementById('rodeo-name').value.trim(),
          rodeoDate: document.getElementById('rodeo-date').value.trim(),
          contestants: roster.map(r => ({ id: String(r.id), notes: r.notes })),
        };

        const res = await fetch('/api/sheet/pdf', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        if (!res.ok) {
          const err = await res.json();
          alert('Error: ' + (err.error || res.statusText));
          return;
        }

        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = (body.rodeoName || 'chute-roster') + '.pdf';
        a.click();
        URL.revokeObjectURL(url);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Generate PDF';
      }
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
